name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install Python QA dependencies
        run: python -m pip install -r requirements-qa.txt

      - name: Install native QA tools on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg ninja-build

      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: |
          if brew tap | grep -qx aws/tap; then
            brew untap aws/tap
          fi
          brew install ffmpeg

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Check public source layout
        run: python scripts/check_public_release.py --source .
